<div class="file-explorer-container">
  @switch (session.profileType) {
    @case ('SCP_FILE_EXPLORER') {
      <app-scp [session]="session"></app-scp>
    }
    @case ('FTP_FILE_EXPLORER') {
      <app-ftpHandler [session]="session"></app-ftpHandler>
    }
    @case ('SAMBA_FILE_EXPLORER') {
      <app-samba [session]="session"></app-samba>
    }
  }
</div>
