<p-toolbar class="bottom-toolbar">
    <ng-template pTemplate="end">
        <div class="toolbar-actions">
            <p-button icon="pi pi-bars" styleClass="p-button-text p-button-rounded"
                (onClick)="toggleSplit('vertical', 50)"
                [ngClass]="{'p-button-highlight': tabService.splitMode && tabService.splitDirection === 'vertical' && tabService.splitRatio === 50}"
                aria-label="Split View 50/50 Vertical"></p-button>
            <p-button icon="pi pi-window-maximize" styleClass="p-button-text p-button-rounded"
                (onClick)="toggleSplit('horizontal', 60)"
                [ngClass]="{'p-button-highlight': tabService.splitMode && tabService.splitDirection === 'horizontal' && tabService.splitRatio === 60}"
                aria-label="Split View 60/40 Horizontal"></p-button>
            <p-button icon="pi pi-sparkles" styleClass="p-button-text p-button-rounded"
                [disabled]="!isAiConfigured"
                (onClick)="toggleAi()"
                [ngClass]="{'p-button-highlight': (aiChatService.isOpen$ | async)}"
                aria-label="Toggle AI Assistant"></p-button>
        </div>
    </ng-template>
</p-toolbar>
