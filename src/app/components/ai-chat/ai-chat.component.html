<div class="chat-container" [class.open]="aiChatService.isOpen$ | async">
  <div class="chat-header">
    <div class="header-title">
      <mat-icon>smart_toy</mat-icon>
      <span>AI Assistant</span>
    </div>
    <div class="header-actions">
      <div class="toggle-group" title="Agent Mode (execute commands instantly)">
        <mat-icon>terminal</mat-icon>
        <mat-slide-toggle [(ngModel)]="agentMode"></mat-slide-toggle>
      </div>
      <div class="toggle-group" title="Use active terminal context">
        <mat-icon>article</mat-icon>
        <mat-slide-toggle [(ngModel)]="useContext"></mat-slide-toggle>
      </div>
      <button mat-icon-button (click)="toggleChat()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <div class="chat-messages" #scrollMe [scrollTop]="scrollMe.scrollHeight">
    @for (msg of messages; track msg) {
    <div class="message" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'" [class.system]="msg.role === 'system'">
      <div class="message-content" [innerHTML]="parseMarkdown(msg.content)"></div>
    </div>
    }
    @if (isLoading) {
    <div class="message assistant">
      <div class="message-content" style="display: flex; align-items: center; gap: 8px;">
        @if (messages.length === 0 || messages[messages.length-1].role !== 'assistant' || messages[messages.length-1].content === '') {
          <mat-spinner diameter="20"></mat-spinner>
        }
        <button mat-icon-button (click)="stop()" title="Stop Generation" style="color: #ff5252;">
          <mat-icon>stop_circle</mat-icon>
        </button>
      </div>
    </div>
    }
  </div>

  <div class="chat-input-area">
    <mat-form-field class="chat-input" appearance="outline">
      <input matInput placeholder="Ask AI..." [(ngModel)]="userInput" (keyup.enter)="sendMessage()" [disabled]="isLoading">
      <button matSuffix mat-icon-button (click)="sendMessage()" [disabled]="isLoading">
        <mat-icon>send</mat-icon>
      </button>
    </mat-form-field>
  </div>
</div>
