<div class="modal-container modal-container--panel">
  <div class="modal">
    <div class="modal-header">
      <h3>{{ 'QUICKCONNECT.TITLE' | translate }}</h3>
      <button mat-icon-button class="modal-close-btn" (click)="close()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="modal-content">
      <app-profile-form [profile]="profile" (onProfileCancel)="onCancel($event)"
        (onProfileSave)="onSaveOne($event)"></app-profile-form>

    </div>
  </div>
</div>
