<div class="terminal-container" #termContainer>
  <div class="terminal-toolbar" *ngIf="isSsh">
    <p-button icon="pi pi-folder-open" styleClass="p-button-text p-button-sm"
      (onClick)="openScpExplorer($event)" title="Open File Explorer"></p-button>
  </div>
  <div #term id="term">
    <!-- xterm.js will insert its DOM here -->
  </div>
  <div class="terminal-footer"></div>
</div>
