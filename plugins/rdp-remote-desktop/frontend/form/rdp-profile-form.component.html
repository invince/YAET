<div [formGroup]="form">
  <mat-form-field class="field">
    <mat-label>{{ 'COMMON.HOST_NAME' | translate }}</mat-label>
    <input matInput type="text" formControlName="host" required/>
    @if (form.get('host')?.value) {
    <button
      matSuffix
      mat-icon-button
      aria-label="Clear"
      (click)="clear(form,'host')">
      <mat-icon>close</mat-icon>
    </button>
    }
  </mat-form-field>

  <mat-slide-toggle formControlName="fullScreen">{{ 'RDP.FULL_SCREEN' | translate }}</mat-slide-toggle>
  <br>
  <br>
  <mat-slide-toggle formControlName="asAdmin">{{ 'RDP.LOG_AS_ADMIN' | translate }}</mat-slide-toggle>

</div>
